# CI for theman (P6-CAL + AGENTS.md requirement)
# PR / push 必須跑 python run_tests.py 全綠。
name: theman-tests

on:
  push:
    branches: [ main, "feat/*", "fix/*", "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt --quiet
      - run: python run_tests.py
        working-directory: .
      # 未來可加：UAT 模擬 key（若有）、determinism 重複跑、coverage gate。