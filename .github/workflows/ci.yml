# CI for trading-app — PR / push must pass python run_tests.py.
name: trading-app-tests

on:
  push:
    branches: [ main, "feat/*", "fix/*", "feature/*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: bash scripts/ci-setup.sh
      - run: python run_tests.py
        working-directory: .